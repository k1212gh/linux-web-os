# AgentOS Workstation — Docker services
#
# All services bind to 127.0.0.1 only. External access goes through
# Caddy (also on 127.0.0.1) + Tailscale serve. No public exposure.
#
# Data dirs under ./data (gitignored). Start: `docker compose up -d`

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: agentos-jenkins
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:50000:50000"
    volumes:
      - ./data/jenkins:/var/jenkins_home
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true

  grafana:
    image: grafana/grafana:latest
    container_name: agentos-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_ADMIN_PASSWORD_FILE=/run/secrets/grafana_admin
    secrets:
      - grafana_admin

  prometheus:
    image: prom/prometheus:latest
    container_name: agentos-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus

  portainer:
    image: portainer/portainer-ce:latest
    container_name: agentos-portainer
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/portainer:/data

  ollama:
    image: ollama/ollama:rocm
    container_name: agentos-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    devices:
      - /dev/kfd
      - /dev/dri
    environment:
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
    group_add:
      - video
      - render

secrets:
  grafana_admin:
    file: ./secrets/grafana_admin.txt
